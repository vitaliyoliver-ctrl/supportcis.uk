<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Operation Structure</title>
<style>
:root{color-scheme:light;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#f0f2f7;font-family:'Segoe UI',system-ui,sans-serif;color:#1a1e2e;}
body{padding:20px 16px 40px;min-height:100vh;}

.top-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.pill{background:#fff;border:0.5px solid #d0d4e4;border-radius:20px;padding:5px 14px;font-size:12px;color:#5a6080;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.pill b{color:#1a1e2e;font-weight:500;}
.btn{background:#fff;border:0.5px solid #c0c8e0;border-radius:20px;padding:5px 16px;font-size:12px;color:#4a5480;cursor:pointer;transition:all .15s;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.btn:hover{background:#f0f2ff;color:#3040a0;border-color:#8090d0;}
.btn.edit-on{background:#e8ecff;border-color:#5560cc;color:#3040a0;}

.edit-hint{font-size:11px;color:#8090b0;text-align:center;margin-bottom:8px;transition:opacity .2s;}

.grid{display:grid;grid-template-columns:repeat(10,1fr);width:100%;}
.dept-col{display:flex;flex-direction:column;align-items:stretch;padding:0 3px;}
.card{border-radius:10px;overflow:hidden;border:1px solid;width:100%;}
.card-head{padding:10px 10px 9px;text-align:center;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;user-select:none;}
.dname{font-size:13px;font-weight:500;display:block;line-height:1.3;}
.dtotal{font-size:11px;display:block;margin-top:3px;opacity:1;font-weight:500;}
.darr{font-size:10px;display:block;margin-top:4px;opacity:.5;transition:transform .2s;}
.dept-col.open .darr{transform:rotate(180deg);opacity:.6;}
.card-body{display:none;padding:6px 10px 9px;background:rgba(255,255,255,.5);}
.dept-col.open .card-body{display:block;}
.role-row{display:flex;justify-content:space-between;align-items:center;gap:4px;padding:3px 0;border-bottom:0.5px solid rgba(0,0,0,.06);}
.role-row:last-child{border-bottom:none;}
.rn{font-size:11.5px;color:#2a3060;flex:1;}
.rc{font-size:11.5px;font-weight:500;white-space:nowrap;}
.expand-btn{display:block;width:100%;margin:4px 0 0;background:rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.18);border-radius:6px;color:rgba(0,0,0,.65);font-size:11px;font-weight:500;padding:6px 0;cursor:pointer;text-align:center;transition:background .15s,color .15s;}
.expand-btn:hover{background:rgba(0,0,0,.13);color:rgba(0,0,0,.95);}

body.editing .rn,
body.editing .rc,
body.editing .dname{cursor:text;outline:1px dashed rgba(60,80,200,.3);outline-offset:1px;border-radius:3px;}
body.editing .rn:hover,
body.editing .rc:hover,
body.editing .dname:hover{outline-color:rgba(60,80,200,.6);background:rgba(80,100,220,.08);}
body.editing .role-row{padding-right:20px;position:relative;}
body.editing .del-row{display:flex;}
.del-row{display:none;position:absolute;right:0;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(180,40,40,.5);font-size:11px;cursor:pointer;padding:2px 3px;line-height:1;}
.del-row:hover{color:#cc4444;}
body.editing .add-row-btn{display:block;}
.add-row-btn{display:none;width:100%;margin-top:4px;background:rgba(40,120,60,.06);border:0.5px dashed rgba(40,120,60,.4);border-radius:5px;color:rgba(30,130,60,.6);font-size:10px;padding:4px 0;cursor:pointer;text-align:center;transition:all .15s;}
.add-row-btn:hover{background:rgba(40,120,60,.15);color:rgba(20,140,60,.9);}

.cc-c{background:#dceeff;border-color:#4080c0;}.cc-h{background:#c8e0f8;}.cc-n{color:#0a3a80;}.cc-t{color:#0a3a80;}.cc-r{color:#0a3a80;}
.pv-c{background:#d4f0de;border-color:#30904e;}.pv-h{background:#beeace;}.pv-n{color:#0a4a28;}.pv-t{color:#0a4a28;}.pv-r{color:#0a4a28;}
.py-c{background:#fde8bc;border-color:#a07020;}.py-h{background:#fcd8a0;}.py-n{color:#603800;}.py-t{color:#603800;}.py-r{color:#603800;}
.su-c{background:#dddaff;border-color:#5050c0;}.su-h{background:#ccc8ff;}.su-n{color:#200080;}.su-t{color:#200080;}.su-r{color:#200080;}
.af-c{background:#fdd0c8;border-color:#b04030;}.af-h{background:#fcbcb0;}.af-n{color:#700000;}.af-t{color:#700000;}.af-r{color:#700000;}
.bn-c{background:#d8f0c4;border-color:#4a8020;}.bn-h{background:#c0e4a8;}.bn-n{color:#204000;}.bn-t{color:#204000;}.bn-r{color:#204000;}
.rc-c{background:#fdd0e8;border-color:#a04080;}.rc-h{background:#fbb8d8;}.rc-n{color:#600040;}.rc-t{color:#600040;}.rc-r{color:#600040;}
.ds-c{background:#e4e4e0;border-color:#707070;}.ds-h{background:#d4d4d0;}.ds-n{color:#1a1a1a;}.ds-t{color:#1a1a1a;}.ds-r{color:#1a1a1a;}
.cn-c{background:#e4e4e0;border-color:#707070;}.cn-h{background:#d4d4d0;}.cn-n{color:#1a1a1a;}.cn-t{color:#1a1a1a;}.cn-r{color:#1a1a1a;}
.cr-c{background:#fde0c0;border-color:#a05020;}.cr-h{background:#fcc898;}.cr-n{color:#602000;}.cr-t{color:#602000;}.cr-r{color:#602000;}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(200,205,220,.7);backdrop-filter:blur(6px);align-items:center;justify-content:center;padding:20px;}
.overlay.active{display:flex;}

/* TREE OVERLAY */
.su-ov{display:none;position:fixed;inset:0;z-index:1001;background:rgba(200,205,220,.75);backdrop-filter:blur(8px);overflow-y:auto;}
.su-ov.active{display:block;}
.su-panel{background:#fff;border:1px solid #d0d4e8;border-radius:16px;width:calc(100% - 32px);margin:16px auto;box-shadow:0 8px 40px rgba(0,0,0,.15);animation:popIn .18s ease;}
@keyframes popIn{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.su-head{padding:16px 22px 13px;border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;border-radius:16px 16px 0 0;background:#fff;position:sticky;top:0;z-index:2;}
.su-head-title{font-size:18px;font-weight:500;color:#3030a0;}
.su-head-sub{font-size:11px;color:#8090b0;margin-top:2px;}
.su-body{padding:24px 28px 32px;overflow-x:auto;}
.close-btn{background:#f0f2f8;border:0.5px solid #c0c8e0;border-radius:8px;color:#5060a0;font-size:13px;padding:5px 12px;cursor:pointer;flex-shrink:0;margin-left:12px;transition:background .15s;}
.close-btn:hover{background:#e0e4f4;color:#2030a0;}

/* ── INTERACTIVE TREE ── */
.tree-wrap{overflow-x:auto;padding:10px 0;}
.tree-node-wrap{display:flex;flex-direction:column;align-items:center;}
.tree-node{position:relative;display:inline-flex;align-items:center;gap:4px;}
.tree-node-box{border-radius:8px;border:1px solid;padding:7px 12px;text-align:center;white-space:nowrap;min-width:100px;}
.tree-node-box .tn-title{font-size:12px;font-weight:500;display:block;}
.tree-node-box .tn-count{font-size:11px;display:block;margin-top:1px;color:#7080a0;}

/* node action buttons */
.tree-node-actions{display:none;position:absolute;top:-6px;right:-22px;flex-direction:column;gap:2px;z-index:10;}
body.editing .tree-node{position:relative;}
body.editing .tree-node-actions{display:flex;}
.tna-btn{width:18px;height:18px;border-radius:4px;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.tna-add{background:rgba(40,160,60,.12);color:#1a9040;}
.tna-add:hover{background:rgba(40,160,60,.3);}
.tna-del{background:rgba(180,40,40,.1);color:#b02020;}
.tna-del:hover{background:rgba(180,40,40,.25);}

/* connector lines */
.tree-children-wrap{display:flex;justify-content:center;position:relative;}
.tree-v-line{width:1px;height:18px;background:#b0b8d8;margin:0 auto;}
.tree-h-bar{display:flex;align-items:flex-start;justify-content:center;position:relative;margin-top:0;}
.tree-child-col{display:flex;flex-direction:column;align-items:center;padding:0 8px;}
.tree-child-drop{width:1px;height:18px;background:#b0b8d8;margin:0 auto;}
.tree-child-col{position:relative;}
.tree-child-col::before{content:'';position:absolute;top:0;left:50%;width:1px;height:18px;background:#b0b8d8;}

/* level colors */
.lv-head{background:#eeeaff;border-color:#7060d0;} .lv-head .tn-title{color:#3020a0;font-size:13px;}
.lv-tl{background:#e8e6ff;border-color:#9080e0;} .lv-tl .tn-title{color:#4030b0;}
.lv-sup{background:#e4eaff;border-color:#8090d0;} .lv-sup .tn-title{color:#3050c0;}
.lv-mgr{background:#e4f2f8;border-color:#6090c0;} .lv-mgr .tn-title{color:#2070a0;}
.lv-vip{background:#f4eaff;border-color:#b080e0;} .lv-vip .tn-title{color:#7030c0;}
.lv-qa{background:#e4f8ea;border-color:#60c080;} .lv-qa .tn-title{color:#207040;}
.lv-dr{background:#fce8f4;border-color:#d080b0;} .lv-dr .tn-title{color:#902070;}
.lv-nk{background:#faf4e4;border-color:#c0a040;} .lv-nk .tn-title{color:#806010;}

/* node name edit */
body.editing .tree-node-box .tn-title{cursor:text;outline:1px dashed rgba(60,80,200,.3);border-radius:2px;}
body.editing .tree-node-box .tn-count{cursor:text;outline:1px dashed rgba(60,80,200,.3);border-radius:2px;}

/* Add node modal */
.add-node-modal{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.add-node-modal.active{display:flex;}
.add-node-box{background:#fff;border-radius:14px;padding:24px 28px;width:320px;box-shadow:0 8px 40px rgba(0,0,0,.2);animation:popIn .15s ease;}
.add-node-box h3{font-size:15px;font-weight:600;margin-bottom:16px;color:#2a3060;}
.add-node-box input{width:100%;border:1px solid #c0c8e0;border-radius:8px;padding:9px 12px;font-size:14px;outline:none;margin-bottom:8px;font-family:inherit;}
.add-node-box input:focus{border-color:#5060c0;}
.add-node-box label{font-size:12px;color:#6070a0;display:block;margin-bottom:4px;}
.add-node-box select{width:100%;border:1px solid #c0c8e0;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;margin-bottom:16px;font-family:inherit;background:#fff;}
.add-node-box select:focus{border-color:#5060c0;}
.add-node-btns{display:flex;gap:8px;justify-content:flex-end;}
.anb-cancel{background:#f0f2f8;border:1px solid #c0c8e0;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#5060a0;}
.anb-ok{background:#4050c0;border:none;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;color:#fff;font-weight:500;}
.anb-ok:hover{background:#3040b0;}
</style>
</head>
<body>

<div class="top-bar">
  <div class="pill">FTE: <b id="fteTotal">—</b></div>
  <div class="pill">Отделов: <b>10</b></div>
  <button class="btn" id="editBtn" onclick="toggleEdit()">✎ Редактировать</button>
  <span id="saveStatus" style="font-size:12px;color:#22c55e;opacity:0;transition:opacity 0.5s;padding:5px 10px;"></span>
</div>
<div class="edit-hint" id="editHint"></div>

<div style="display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:0;padding:0 20px;position:relative;">
  <div id="headNode" style="background:#e8e4ff;border:2px solid #7060c0;border-radius:12px;padding:14px 48px;text-align:center;white-space:nowrap;box-shadow:0 3px 12px rgba(100,80,200,.15);">
    <span style="font-size:16px;font-weight:600;color:#3020a0;">Head of Operations</span>
  </div>
  <div style="width:32px;height:1px;background:#b0b8d8;flex-shrink:0;"></div>
  <div style="background:#f0f0ff;border:1px solid #a0a0d8;border-radius:8px;padding:5px 14px;text-align:center;white-space:nowrap;">
    <div style="font-size:11px;font-weight:500;color:#5050b0;">Operation Manager</div>
    <div style="font-size:10px;color:#9090b8;margin-top:1px;">3</div>
  </div>
</div>
<div id="connectorWrap" style="position:relative;width:100%;"></div>
<div class="grid" id="grid"></div>

<!-- TREE OVERLAY -->
<div class="su-ov" id="suOv">
  <div class="su-panel" id="suPanel">
    <div class="su-head">
      <div>
        <div class="su-head-title" id="suTitle">Структура отдела</div>
        <div class="su-head-sub" id="suSub"></div>
      </div>
      <button class="close-btn" onclick="closeSu()">✕ закрыть</button>
    </div>
    <div class="su-body" id="suBody"></div>
  </div>
</div>

<!-- ADD NODE MODAL -->
<div class="add-node-modal" id="addNodeModal">
  <div class="add-node-box">
    <h3>➕ Добавить узел</h3>
    <label>Название позиции</label>
    <input type="text" id="addNodeName" placeholder="напр. Senior Supervisor"/>
    <label>Количество человек</label>
    <input type="number" id="addNodeCount" placeholder="1" value="1" min="0" step="0.5"/>
    <label id="addNodeParentLabel">Родительский узел</label>
    <select id="addNodeParent" style="width:100%;border:1px solid #c0c8e0;border-radius:8px;padding:9px 12px;font-size:13px;outline:none;margin-bottom:8px;font-family:inherit;background:#fff;"></select>
    <label>Уровень (стиль)</label>
    <select id="addNodeLevel">
      <option value="lv-head">Head (фиолетовый)</option>
      <option value="lv-tl">TL (светло-фиолетовый)</option>
      <option value="lv-sup" selected>Supervisor (синий)</option>
      <option value="lv-mgr">Manager (голубой)</option>
      <option value="lv-vip">VIP (сиреневый)</option>
      <option value="lv-qa">QA (зелёный)</option>
      <option value="lv-dr">Other (розовый)</option>
      <option value="lv-nk">NC/NK (жёлтый)</option>
    </select>
    <div class="add-node-btns">
      <button class="anb-cancel" onclick="closeAddNodeModal()">Отмена</button>
      <button class="anb-ok" onclick="confirmAddNode()">Добавить</button>
    </div>
  </div>
</div>

<script>
var API_URL = 'https://ops-structure-api.vitaliy-barkhanskiy.workers.dev/';
var DATA = [];
var editMode = false;
var currentDeptId = null; // dept open in tree overlay
var pendingParentPath = null; // path to parent node for add

var accentMap={cc:'#2a5090',pv:'#1a6040',py:'#5a3c10',su:'#3e38a0',af:'#6a2c14',bn:'#2e5014',rc:'#681e4a',ds:'#4a4844',cn:'#4a4844',cr:'#623a18'};

// ── DEFAULT TREE BUILDER ──
// Converts flat roles array to a tree structure for departments that don't have one yet
function buildDefaultTree(id, roles) {
  function g(name) {
    var r = roles.find(function(x){ return x[0]===name; });
    return r ? r[1] : '0';
  }
  if (id==='cc') return {label:'Head CC',count:g('Head CC'),cls:'lv-head',children:[
    {label:'Head SG',count:g('Head SG'),cls:'lv-tl',children:[
      {label:'TL Active',count:g('TL Active'),cls:'lv-tl',children:[{label:'Manager Active',count:g('Manager Active'),cls:'lv-mgr',children:[]}]},
      {label:'TL Awol',count:g('TL Awol'),cls:'lv-tl',children:[{label:'Manager Awol',count:g('Manager Awol'),cls:'lv-mgr',children:[]}]},
      {label:'QA TL',count:g('QA TL'),cls:'lv-qa',children:[{label:'QA',count:g('QA'),cls:'lv-qa',children:[]}]},
      {label:'IVM Manager',count:g('IVM Manager'),cls:'lv-dr',children:[]},
      {label:'Coach',count:g('Coach'),cls:'lv-dr',children:[]},
      {label:'Statistician',count:g('Statistician'),cls:'lv-dr',children:[]},
    ]},
    {label:'Head NC',count:g('Head NC'),cls:'lv-nk',children:[
      {label:'TL NC',count:g('TL NC'),cls:'lv-nk',children:[{label:'Manager NC',count:g('Manager NC'),cls:'lv-nk',children:[]}]},
    ]},
  ]};
  if (id==='pv') return {label:'Head',count:g('Head'),cls:'lv-head',children:[
    {label:'TL',count:g('TL'),cls:'lv-tl',children:[{label:'Manager',count:g('Manager'),cls:'lv-mgr',children:[]}]},
  ]};
  if (id==='py') return {label:'Head',count:g('Head'),cls:'lv-head',children:[
    {label:'Supervisor SG',count:g('Supervisor SG'),cls:'lv-sup',children:[
      {label:'L1 SG',count:g('L1 SG'),cls:'lv-mgr',children:[]},
      {label:'L2 SG',count:g('L2 SG'),cls:'lv-mgr',children:[]},
    ]},
    {label:'Supervisor NC',count:g('Supervisor NC'),cls:'lv-nk',children:[
      {label:'L2 NC',count:g('L2 NC'),cls:'lv-nk',children:[]},
    ]},
  ]};
  if (id==='su') return {label:'Head',count:g('Head'),cls:'lv-head',children:[
    {label:'TL SG',count:g('TL SG'),cls:'lv-tl',children:[
      {label:'Supervisor',count:g('Supervisor'),cls:'lv-sup',children:[{label:'Sup. Manager',count:g('Sup. Manager'),cls:'lv-mgr',children:[]}]},
      {label:'VIP-Supervisor',count:g('VIP-Supervisor'),cls:'lv-vip',children:[{label:'Support VIP',count:g('Support VIP'),cls:'lv-vip',children:[]}]},
      {label:'Coach',count:g('Coach'),cls:'lv-dr',children:[]},
      {label:'Complaints Mgr',count:g('Complaints Mgr'),cls:'lv-dr',children:[]},
      {label:'Analyst',count:g('Analyst'),cls:'lv-dr',children:[]},
      {label:'AI',count:g('AI'),cls:'lv-dr',children:[]},
    ]},
    {label:'TL NC',count:g('TL NC'),cls:'lv-nk',children:[
      {label:'Supervisor NC',count:g('Supervisor NC'),cls:'lv-nk',children:[
        {label:'Sup. Mgr NC',count:g('Sup. Mgr NC'),cls:'lv-nk',children:[]},
        {label:'VIP NC',count:g('VIP NC'),cls:'lv-vip',children:[]},
      ]},
    ]},
    {label:'QA TL',count:g('QA TL'),cls:'lv-qa',children:[{label:'QA',count:g('QA'),cls:'lv-qa',children:[]}]},
  ]};
  if (id==='af') return {label:'Head',count:g('Head'),cls:'lv-head',children:[
    {label:'TL SG',count:g('TL SG'),cls:'lv-tl',children:[
      {label:'Supervisor AF',count:g('Supervisor AF'),cls:'lv-sup',children:[{label:'AF',count:g('AF'),cls:'lv-mgr',children:[]},{label:'KYC',count:g('KYC'),cls:'lv-mgr',children:[]}]},
      {label:'Supervisor pay',count:g('Supervisor pay'),cls:'lv-sup',children:[{label:'Pay. Manager',count:g('Pay. Manager'),cls:'lv-mgr',children:[]}]},
      {label:'Supervisor QA',count:g('Supervisor QA'),cls:'lv-qa',children:[{label:'QA AF',count:g('QA AF'),cls:'lv-qa',children:[]}]},
    ]},
    {label:'TL NC',count:g('TL NC'),cls:'lv-nk',children:[
      {label:'Supervisor NC',count:g('Supervisor NC'),cls:'lv-nk',children:[
        {label:'AF NC',count:g('AF NC'),cls:'lv-nk',children:[]},
        {label:'QA NC',count:g('QA NC'),cls:'lv-nk',children:[]},
        {label:'Pay. Mgr NC',count:g('Pay. Mgr NC'),cls:'lv-nk',children:[]},
        {label:'KYC NC',count:g('KYC NC'),cls:'lv-nk',children:[]},
      ]},
    ]},
  ]};
  if (id==='bn') return {label:'Head',count:g('Head'),cls:'lv-head',children:[
    {label:'TL SG',count:g('TL SG'),cls:'lv-tl',children:[
      {label:'Supervisor',count:g('Supervisor'),cls:'lv-sup',children:[
        {label:'Manager',count:g('Manager'),cls:'lv-mgr',children:[]},
        {label:'QA',count:g('QA'),cls:'lv-qa',children:[]},
      ]},
    ]},
    {label:'TL NC',count:g('TL NC'),cls:'lv-nk',children:[{label:'Manager NC',count:g('Manager NC'),cls:'lv-nk',children:[]}]},
  ]};
  if (id==='rc') return {label:'Head',count:g('Head'),cls:'lv-head',children:[
    {label:'Senior Recruiter',count:g('Senior Recruiter'),cls:'lv-tl',children:[{label:'Recruiter',count:g('Recruiter'),cls:'lv-mgr',children:[]}]},
  ]};
  if (id==='ds') return {label:'Team Lead',count:g('Team Lead'),cls:'lv-head',children:[
    {label:'Designer',count:g('Designer'),cls:'lv-mgr',children:[]},
    {label:'Motion Designer',count:g('Motion Designer'),cls:'lv-mgr',children:[]},
  ]};
  if (id==='cn') return {label:'Head',count:g('Head'),cls:'lv-head',children:[
    {label:'Copywriter',count:g('Copywriter'),cls:'lv-mgr',children:[]},
  ]};
  if (id==='cr') return {label:'CRM & Email',count:'—',cls:'lv-head',children:[
    {label:'TL Promo',count:g('TL Promo'),cls:'lv-tl',children:[
      {label:'Supervisor Promo',count:g('Supervisor Promo'),cls:'lv-sup',children:[
        {label:'Mktg Promo',count:g('Marketing Mgr (Promo)'),cls:'lv-mgr',children:[]},
        {label:'Mktg mail.ru',count:g('Marketing Mgr (mail.ru)'),cls:'lv-mgr',children:[]},
      ]},
    ]},
    {label:'TL Trigger',count:g('TL Trigger'),cls:'lv-tl',children:[
      {label:'Supervisor Trigger',count:g('Supervisor Trigger'),cls:'lv-sup',children:[
        {label:'Mktg Trigger',count:g('Marketing Mgr (Trigger)'),cls:'lv-mgr',children:[]},
      ]},
    ]},
    {label:'Data Specialist',count:g('Data Specialist'),cls:'lv-dr',children:[]},
    {label:'Head Deliv.',count:g('Head Deliv.'),cls:'lv-head',children:[
      {label:'TL Deliv.',count:g('TL Deliv.'),cls:'lv-tl',children:[
        {label:'Supervisor Deliv.',count:g('Supervisor Deliv.'),cls:'lv-sup',children:[
          {label:'Manager Deliv.',count:g('Manager Deliv.'),cls:'lv-mgr',children:[]},
        ]},
      ]},
    ]},
  ]};
  return {label:'Отдел',count:'—',cls:'lv-head',children:[]};
}

// ── ENSURE TREE ──
function ensureTree(d) {
  if (!d.tree) {
    d.tree = buildDefaultTree(d.id, d.roles);
  }
}

// ── FLATTEN TREE to roles sync ──
function flattenTree(node, result) {
  if (!result) result = [];
  if (node.label !== 'CRM & Email') { // skip virtual root for cr
    result.push([node.label, String(node.count)]);
  }
  if (node.children) node.children.forEach(function(c){ flattenTree(c, result); });
  return result;
}

function syncRolesFromTree(d) {
  var flat = [];
  function walk(node) {
    // skip virtual root nodes that have no real count
    if (node.count !== '—' && node.label !== d.label) {
      flat.push([node.label, String(node.count)]);
    } else if (node.count !== '—') {
      flat.push([node.label, String(node.count)]);
    }
    if (node.children) node.children.forEach(walk);
  }
  walk(d.tree);
  d.roles = flat;
}

// ── RENDER GRID ──
function render() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  DATA.forEach(function(d) {
    var p = d.pfx;
    var col = document.createElement('div');
    col.className = 'dept-col';
    col.dataset.id = d.id;

    var rolesHTML = d.roles.map(function(r, i) {
      return '<div class="role-row">' +
        '<span class="rn" contenteditable="false" data-field="rn" data-idx="'+i+'" data-id="'+d.id+'">'+escH(r[0])+'</span>' +
        '<span class="rc '+p+'-r" contenteditable="false" data-field="rc" data-idx="'+i+'" data-id="'+d.id+'">'+escH(r[1])+'</span>' +
        '<button class="del-row" title="Удалить строку" onclick="delRow(\''+d.id+'\','+i+')">✕</button>' +
        '</div>';
    }).join('');

    col.innerHTML =
      '<div class="card '+p+'-c">' +
        '<div class="card-head '+p+'-h" onclick="headClick(event,\''+d.id+'\')">' +
          '<span class="dname '+p+'-n" contenteditable="false" data-field="label" data-id="'+d.id+'">'+escH(d.label)+'</span>' +
          '<span class="dtotal '+p+'-t">'+deptSum(d)+'</span>' +
          '<span class="darr '+p+'-t">▼</span>' +
        '</div>' +
        '<div class="card-body">' +
          rolesHTML +
          '<button class="add-row-btn" onclick="addRow(\''+d.id+'\')">+ добавить позицию</button>' +
        '</div>' +
      '</div>' +
      '<button class="expand-btn" onclick="openDeptTree(\''+d.id+'\')">⤢ детально</button>';

    grid.appendChild(col);
  });

  setTimeout(drawConnectors, 50);

  grid.querySelectorAll('[contenteditable]').forEach(function(el) {
    el.addEventListener('blur', function() { saveEdit(el); });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
    });
  });
}

function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── EDIT MODE ──
function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('editing', editMode);
  var btn = document.getElementById('editBtn');
  var hint = document.getElementById('editHint');
  if (editMode) {
    btn.classList.add('edit-on');
    btn.textContent = '✓ Готово';
    hint.textContent = 'Кликни на текст чтобы изменить · + добавить позицию · ✕ удалить · В дереве: + добавить дочерний узел';
    document.querySelectorAll('[contenteditable]').forEach(function(el){ el.setAttribute('contenteditable','true'); });
  } else {
    btn.classList.remove('edit-on');
    btn.textContent = '✎ Редактировать';
    hint.textContent = '';
    document.querySelectorAll('[contenteditable]').forEach(function(el){ el.setAttribute('contenteditable','false'); });
  }
  // re-render tree if open
  if (currentDeptId) renderTree(currentDeptId);
}

function headClick(e, id) {
  if (editMode && e.target.hasAttribute('data-field')) return;
  var col = document.querySelector('.dept-col[data-id="'+id+'"]');
  if (col) col.classList.toggle('open');
}

function saveEdit(el) {
  var id = el.dataset.id;
  var field = el.dataset.field;
  var val = el.textContent.trim();
  var d = DATA.find(function(x){ return x.id === id; });
  if (!d) return;
  if (field === 'label') { d.label = val; recalcAll(); saveToAPI(); }
  else if (field === 'rn') {
    var oldName = d.roles[+el.dataset.idx][0];
    d.roles[+el.dataset.idx][0] = val;
    // sync tree node name
    if (d.tree) renameTreeNode(d.tree, oldName, val);
    saveToAPI();
  }
  else if (field === 'rc') {
    d.roles[+el.dataset.idx][1] = val;
    // sync tree node count
    if (d.tree) updateTreeNodeCount(d.tree, d.roles[+el.dataset.idx][0], val);
    recalcAll();
    saveToAPI();
  }
}

function renameTreeNode(node, oldName, newName) {
  if (node.label === oldName) node.label = newName;
  if (node.children) node.children.forEach(function(c){ renameTreeNode(c, oldName, newName); });
}

function updateTreeNodeCount(node, name, count) {
  if (node.label === name) node.count = count;
  if (node.children) node.children.forEach(function(c){ updateTreeNodeCount(c, name, count); });
}

// ── DEPT SUM ──
function deptSum(d) {
  var total = 0, sg = 0, nk = 0;
  d.roles.forEach(function(r){
    var n = parseFloat(r[1]);
    if (isNaN(n)) return;
    total += n;
    var name = r[0].toLowerCase();
    if (name.indexOf('nc') !== -1 || name.indexOf('nk') !== -1) nk += n;
    else sg += n;
  });
  var t = total % 1 === 0 ? String(total) : total.toFixed(1);
  if (sg > 0 && nk > 0) {
    var s = sg % 1 === 0 ? String(sg) : sg.toFixed(1);
    var k = nk % 1 === 0 ? String(nk) : nk.toFixed(1);
    return 'SG ' + s + ' / NC ' + k;
  }
  return t;
}

function recalcDept(d) {
  var el = document.querySelector('.dept-col[data-id="'+d.id+'"] .dtotal');
  if (el) el.textContent = deptSum(d);
}

function recalcFTE() {
  var total = 0;
  DATA.forEach(function(d){
    d.roles.forEach(function(r){ var n = parseFloat(r[1]); if (!isNaN(n)) total += n; });
  });
  document.getElementById('fteTotal').textContent = total % 1 === 0 ? total : total.toFixed(1);
}

function recalcAll() {
  DATA.forEach(function(d){ recalcDept(d); });
  recalcFTE();
}

// ── DEL / ADD ROW ──
function delRow(id, idx) {
  var d = DATA.find(function(x){ return x.id === id; });
  if (!d) return;
  var roleName = d.roles[idx][0];
  d.roles.splice(idx, 1);
  // remove from tree too
  if (d.tree) deleteTreeNode(d.tree, roleName);
  var wasOpen = document.querySelector('.dept-col[data-id="'+id+'"]').classList.contains('open');
  render();
  if (editMode) {
    document.body.classList.add('editing');
    document.querySelectorAll('[contenteditable]').forEach(function(el){ el.setAttribute('contenteditable','true'); });
  }
  if (wasOpen) document.querySelector('.dept-col[data-id="'+id+'"]').classList.add('open');
  recalcAll();
  saveToAPI();
}

function deleteTreeNode(node, label) {
  if (!node.children) return;
  node.children = node.children.filter(function(c){ return c.label !== label; });
  node.children.forEach(function(c){ deleteTreeNode(c, label); });
}

function addRow(id) {
  var d = DATA.find(function(x){ return x.id === id; });
  if (!d) return;
  ensureTree(d);
  // Open modal to add to tree, from card context
  pendingParentPath = null;
  pendingCardDeptId = id;
  // build parent selector with all tree nodes
  buildParentSelector(d.tree, document.getElementById('addNodeParent'), '');
  document.getElementById('addNodeName').value = '';
  document.getElementById('addNodeCount').value = '1';
  document.getElementById('addNodeLevel').value = 'lv-mgr';
  document.getElementById('addNodeModal').classList.add('active');
  setTimeout(function(){ document.getElementById('addNodeName').focus(); }, 100);
}

var pendingCardDeptId = null;

function buildParentSelector(node, select, prefix) {
  if (!select) return;
  if (select.options.length === 0) {
    // first call - clear and add placeholder
    select.innerHTML = '';
  }
  var opt = document.createElement('option');
  opt.value = node.label;
  opt.textContent = prefix + node.label;
  select.appendChild(opt);
  if (node.children) {
    node.children.forEach(function(c){
      buildParentSelector(c, select, prefix + '  ');
    });
  }
}

function findNodeByLabel(node, label) {
  if (node.label === label) return node;
  if (node.children) {
    for (var i = 0; i < node.children.length; i++) {
      var found = findNodeByLabel(node.children[i], label);
      if (found) return found;
    }
  }
  return null;
}

// ── TREE OVERLAY ──
function openDeptTree(id) {
  var d = DATA.find(function(x){ return x.id === id; });
  if (!d) return;
  ensureTree(d);
  currentDeptId = id;
  document.getElementById('suTitle').textContent = d.label + ' — структура отдела';
  document.getElementById('suSub').textContent = deptSum(d) + ' чел. · нажми Esc или фон чтобы закрыть';
  document.getElementById('suPanel').style.borderColor = accentMap[id] || '#2e2888';
  renderTree(id);
  document.getElementById('suOv').classList.add('active');
}

function closeSu() {
  document.getElementById('suOv').classList.remove('active');
  currentDeptId = null;
}

document.getElementById('suOv').addEventListener('click', function(e){
  if (e.target === e.currentTarget) closeSu();
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') { closeSu(); closeAddNodeModal(); }
});

// ── RENDER INTERACTIVE TREE ──
function renderTree(id) {
  var d = DATA.find(function(x){ return x.id === id; });
  if (!d || !d.tree) return;
  var container = document.getElementById('suBody');
  container.innerHTML = '';
  var wrap = document.createElement('div');
  wrap.className = 'tree-wrap';
  wrap.appendChild(buildTreeDOM(d.tree, id, []));
  container.appendChild(wrap);
}

function buildTreeDOM(node, deptId, path) {
  var wrap = document.createElement('div');
  wrap.className = 'tree-node-wrap';

  // Node row
  var nodeRow = document.createElement('div');
  nodeRow.className = 'tree-node';

  // Box
  var box = document.createElement('div');
  box.className = 'tree-node-box ' + (node.cls || 'lv-mgr');

  var titleEl = document.createElement('span');
  titleEl.className = 'tn-title';
  titleEl.textContent = node.label;
  if (editMode) {
    titleEl.contentEditable = 'true';
    titleEl.addEventListener('blur', function() {
      var oldName = node.label;
      var newVal = titleEl.textContent.trim();
      if (newVal && newVal !== oldName) {
        node.label = newVal;
        // sync roles
        var d = DATA.find(function(x){ return x.id === deptId; });
        if (d) {
          var roleIdx = d.roles.findIndex(function(r){ return r[0] === oldName; });
          if (roleIdx >= 0) d.roles[roleIdx][0] = newVal;
          recalcAll();
          render();
          if (currentDeptId) renderTree(currentDeptId);
        }
        saveToAPI();
      }
    });
    titleEl.addEventListener('keydown', function(e){
      if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); }
    });
  }

  var countEl = document.createElement('span');
  countEl.className = 'tn-count';
  countEl.textContent = node.count;
  if (editMode && node.count !== '—') {
    countEl.contentEditable = 'true';
    countEl.addEventListener('blur', function() {
      var newVal = countEl.textContent.trim();
      node.count = newVal;
      // sync roles
      var d = DATA.find(function(x){ return x.id === deptId; });
      if (d) {
        var roleIdx = d.roles.findIndex(function(r){ return r[0] === node.label; });
        if (roleIdx >= 0) { d.roles[roleIdx][1] = newVal; recalcAll(); render(); }
        saveToAPI();
      }
    });
    countEl.addEventListener('keydown', function(e){
      if (e.key === 'Enter') { e.preventDefault(); countEl.blur(); }
    });
  }

  box.appendChild(titleEl);
  box.appendChild(countEl);
  nodeRow.appendChild(box);

  // Action buttons (edit mode)
  if (editMode) {
    var actions = document.createElement('div');
    actions.className = 'tree-node-actions';

    var addBtn = document.createElement('button');
    addBtn.className = 'tna-btn tna-add';
    addBtn.title = 'Добавить дочерний узел';
    addBtn.textContent = '+';
    addBtn.onclick = function(e) {
      e.stopPropagation();
      pendingParentPath = { deptId: deptId, node: node };
      openAddNodeModal();
    };

    var delBtn = document.createElement('button');
    delBtn.className = 'tna-btn tna-del';
    delBtn.title = 'Удалить узел';
    delBtn.textContent = '×';
    delBtn.onclick = function(e) {
      e.stopPropagation();
      if (!confirm('Удалить узел "' + node.label + '" и всех его потомков?')) return;
      var d = DATA.find(function(x){ return x.id === deptId; });
      if (d) {
        // Remove from roles
        function collectLabels(n) {
          var labels = [n.label];
          if (n.children) n.children.forEach(function(c){ labels = labels.concat(collectLabels(c)); });
          return labels;
        }
        var toRemove = collectLabels(node);
        d.roles = d.roles.filter(function(r){ return toRemove.indexOf(r[0]) === -1; });
        // Remove from tree
        deleteTreeNode(d.tree, node.label);
        recalcAll();
        render();
        renderTree(deptId);
        saveToAPI();
      }
    };

    actions.appendChild(addBtn);
    actions.appendChild(delBtn);
    nodeRow.appendChild(actions);
  }

  wrap.appendChild(nodeRow);

  // Children
  if (node.children && node.children.length > 0) {
    var vline = document.createElement('div');
    vline.className = 'tree-v-line';
    wrap.appendChild(vline);

    var hbar = document.createElement('div');
    hbar.className = 'tree-h-bar';

    node.children.forEach(function(child, i) {
      var col = document.createElement('div');
      col.className = 'tree-child-col';

      var drop = document.createElement('div');
      drop.className = 'tree-child-drop';
      col.appendChild(drop);
      col.appendChild(buildTreeDOM(child, deptId, path.concat([i])));
      hbar.appendChild(col);
    });

    wrap.appendChild(hbar);
  }

  return wrap;
}

// ── ADD NODE MODAL ──
function openAddNodeModal() {
  document.getElementById('addNodeName').value = '';
  document.getElementById('addNodeCount').value = '1';
  document.getElementById('addNodeLevel').value = 'lv-mgr';
  // Hide parent selector when adding from tree (parent is already the clicked node)
  document.getElementById('addNodeParent').style.display = 'none';
  document.getElementById('addNodeParentLabel').style.display = 'none';
  document.getElementById('addNodeModal').classList.add('active');
  setTimeout(function(){ document.getElementById('addNodeName').focus(); }, 100);
}

function closeAddNodeModal() {
  document.getElementById('addNodeModal').classList.remove('active');
  pendingParentPath = null;
  pendingCardDeptId = null;
}

function confirmAddNode() {
  var name = document.getElementById('addNodeName').value.trim();
  var count = document.getElementById('addNodeCount').value.trim() || '0';
  var cls = document.getElementById('addNodeLevel').value;

  if (!name) { document.getElementById('addNodeName').focus(); return; }

  var deptId = pendingParentPath ? pendingParentPath.deptId : pendingCardDeptId;
  if (!deptId) return;

  var d = DATA.find(function(x){ return x.id === deptId; });
  if (!d) return;
  ensureTree(d);

  var parentNode;
  if (pendingParentPath) {
    parentNode = pendingParentPath.node;
  } else {
    // from card - use selected parent
    var parentLabel = document.getElementById('addNodeParent').value;
    parentNode = findNodeByLabel(d.tree, parentLabel);
    if (!parentNode) parentNode = d.tree;
  }

  var newNode = { label: name, count: count, cls: cls, children: [] };
  if (!parentNode.children) parentNode.children = [];
  parentNode.children.push(newNode);

  // Add to roles
  d.roles.push([name, count]);

  recalcAll();
  render();
  if (editMode) {
    document.body.classList.add('editing');
    document.querySelectorAll('[contenteditable]').forEach(function(el){ el.setAttribute('contenteditable','true'); });
  }
  if (pendingCardDeptId) {
    document.querySelector('.dept-col[data-id="'+deptId+'"]').classList.add('open');
  }

  closeAddNodeModal();
  if (currentDeptId === deptId) renderTree(deptId);
  saveToAPI();
}

// ── SAVE TO API ──
var saveTimer = null;
function saveToAPI() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function() {
    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(DATA)
    }).then(function(r) {
      if (r.ok) showSaveStatus('✓ Сохранено', '#22c55e');
      else showSaveStatus('✗ Ошибка', '#ef4444');
    }).catch(function() {
      showSaveStatus('✗ Нет связи', '#ef4444');
    });
  }, 800);
}

function showSaveStatus(msg, color) {
  var el = document.getElementById('saveStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color;
  el.style.opacity = '1';
  setTimeout(function() { el.style.opacity = '0'; }, 2500);
}

// ── INIT ──
fetch(API_URL)
  .then(function(r) { return r.json(); })
  .then(function(json) {
    DATA = json;
    render();
    recalcAll();
    setTimeout(drawConnectors, 120);
  })
  .catch(function() {
    render();
    recalcAll();
    setTimeout(drawConnectors, 120);
  });

window.addEventListener('resize', drawConnectors);

function drawConnectors() {
  var wrap = document.getElementById('connectorWrap');
  var head = document.getElementById('headNode');
  var grid = document.getElementById('grid');
  if (!wrap || !head || !grid) return;
  var cols = grid.querySelectorAll('.dept-col');
  if (!cols.length) return;
  var wRect = wrap.getBoundingClientRect();
  var headRect = head.getBoundingClientRect();
  var headCX = headRect.left + headRect.width / 2 - wRect.left;
  var deptCXs = Array.from(cols).map(function(col) {
    var r = col.getBoundingClientRect();
    return r.left + r.width / 2 - wRect.left;
  });
  var firstX = deptCXs[0];
  var lastX  = deptCXs[deptCXs.length - 1];
  var stemH = 24;
  var barY  = stemH;
  var svgH = stemH + 18;
  var svgW = Math.max(lastX + 10, headCX + 10);
  var dept_colors = ['#6090d0','#40a060','#c09040','#8080d0','#c06040','#60a040','#c060a0','#909090','#909090','#b07040'];
  var lines = '';
  lines += '<line x1="'+headCX+'" y1="0" x2="'+headCX+'" y2="'+barY+'" stroke="#b0b8d8" stroke-width="1"/>';
  lines += '<line x1="'+firstX+'" y1="'+barY+'" x2="'+lastX+'" y2="'+barY+'" stroke="#b0b8d8" stroke-width="1"/>';
  deptCXs.forEach(function(cx, i) {
    lines += '<line x1="'+cx+'" y1="'+barY+'" x2="'+cx+'" y2="'+svgH+'" stroke="'+(dept_colors[i]||'#b0b8d8')+'" stroke-width="1.5"/>';
  });
  wrap.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="'+svgW+'" height="'+svgH+'" style="display:block;width:100%;height:'+svgH+'px;overflow:visible;">' + lines + '</svg>';
}
