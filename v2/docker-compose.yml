# SupportCIS v2 — self-hosting на своём сервере (без Cloudflare).
# Поднимает Postgres + приложение (фронт + API в одном Node-процессе).
#
#   cp .env.example .env   # заполнить значения
#   docker compose up -d --build
#
# TLS/домен вешается вашим реверс-прокси (nginx/Traefik/Caddy) перед app:8787.

# Фиксируем имя проекта — том БД (supportcis_pgdata) не зависит от имени каталога,
# поэтому каталог можно переносить/переименовывать без потери данных.
name: supportcis

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supportcis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?задайте POSTGRES_PASSWORD в .env}
      POSTGRES_DB: ${POSTGRES_DB:-supportcis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supportcis} -d ${POSTGRES_DB:-supportcis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-supportcis}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-supportcis}
      PORT: 8787
      SITE: ${SITE}
      OWNER_EMAIL: ${OWNER_EMAIL}
      ALLOWED_DOMAINS: ${ALLOWED_DOMAINS:-velvix.org,gameup.club}
      TG_CHAT_ID: ${TG_CHAT_ID:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_WEBHOOK_SECRET: ${TG_WEBHOOK_SECRET:-}
      HELPDESK_ACCOUNT_ID: ${HELPDESK_ACCOUNT_ID:-}
      HELPDESK_PAT: ${HELPDESK_PAT:-}
    ports:
      - "${APP_PORT:-8787}:8787"

volumes:
  pgdata:
