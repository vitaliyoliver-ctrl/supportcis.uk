<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Перерывы и обеды</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #18181c;
  --surface2: #222228;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f4;
  --muted: #7a7a8c;
  --accent-day: #6ee7b7;
  --accent-day-dim: rgba(110,231,183,0.12);
  --accent-day-border: rgba(110,231,183,0.35);
  --accent-night: #a78bfa;
  --accent-night-dim: rgba(167,139,250,0.12);
  --accent-night-border: rgba(167,139,250,0.35);
  --danger: #f87171;
  --danger-dim: rgba(248,113,113,0.10);
  --warn: #fbbf24;
  --warn-dim: rgba(251,191,36,0.10);
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-day); display: inline-block; margin-right: 6px; transition: background 0.3s; }
body.night .logo-dot { background: var(--accent-night); }

.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.op-wrap { position: relative; }
select {
  appearance: none;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 8px 36px 8px 14px;
  cursor: pointer;
  outline: none;
  min-width: 160px;
  transition: border-color 0.15s;
}
select:hover, select:focus { border-color: var(--accent-day-border); }
body.night select:hover, body.night select:focus { border-color: var(--accent-night-border); }
.select-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted); font-size: 10px; }

.op-badge {
  display: none;
  align-items: center;
  background: var(--accent-day-dim);
  border: 1px solid var(--accent-day-border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 13px;
  font-weight: 500;
  color: var(--accent-day);
  font-family: var(--mono);
  white-space: nowrap;
}
body.night .op-badge { background: var(--accent-night-dim); border-color: var(--accent-night-border); color: var(--accent-night); }
body.vip .op-badge { background: rgba(251,191,36,0.12); border-color: rgba(251,191,36,0.35); color: var(--warn); }
body.nc .op-badge { background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.35); color: var(--danger); }
body.nc .logo-dot { background: var(--danger); }
.seg-btn.active-nc { background: rgba(248,113,113,0.12); color: var(--danger); font-weight: 500; }
body.vip .logo-dot { background: var(--warn); }
.seg-btn.active-vip { background: rgba(251,191,36,0.12); color: var(--warn); font-weight: 500; }

.seg { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.seg-btn { padding: 7px 14px; font-size: 13px; font-family: var(--sans); color: var(--muted); background: transparent; border: none; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.seg-btn.active-day { background: var(--accent-day-dim); color: var(--accent-day); font-weight: 500; }
.seg-btn.active-night { background: var(--accent-night-dim); color: var(--accent-night); font-weight: 500; }

.main { padding: 24px 28px; max-width: 100%; margin: 0 auto; }

.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 28px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
.card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-family: var(--mono); }
.card-val { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; }
.card-val small { font-size: 14px; font-weight: 400; color: var(--muted); }
.card.hi-day { border-color: var(--accent-day-border); background: var(--accent-day-dim); }
.card.hi-day .card-val { color: var(--accent-day); }
.card.hi-night { border-color: var(--accent-night-border); background: var(--accent-night-dim); }
.card.hi-night .card-val { color: var(--accent-night); }

.section-head { display: flex; align-items: center; gap: 10px; margin: 24px 0 10px; }
.section-title { font-size: 11px; font-weight: 500; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); white-space: nowrap; }
.section-sub { font-size: 10px; color: var(--muted); opacity: 0.5; font-family: var(--mono); font-weight: 400; }
.section-line { flex: 1; height: 1px; background: var(--border); }
.quota-warn { font-size: 11px; color: var(--danger); background: var(--danger-dim); border: 1px solid rgba(248,113,113,0.2); border-radius: 6px; padding: 3px 10px; font-family: var(--mono); white-space: nowrap; }

.groups-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
.group { margin-bottom: 14px; }
.group-label { font-size: 11px; font-family: var(--mono); color: var(--muted); letter-spacing: 0.06em; margin-bottom: 7px; padding-left: 2px; display: flex; align-items: center; gap: 8px; }
.hour-warn { font-size: 10px; color: var(--danger); background: var(--danger-dim); border-radius: 4px; padding: 1px 7px; }

.slot-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; }
.slot-grid.wide { grid-template-columns: repeat(8, 1fr); }

.slot { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; background: var(--surface); transition: border-color 0.13s, background 0.13s; }
.slot.free:hover { border-color: var(--border2); }
.slot.taken { background: rgba(255,255,255,0.02); }
.slot.cross-blocked {
  background: rgba(251,191,36,0.05);
  border-color: rgba(251,191,36,0.2);
  opacity: 0.7;
}
.slot.mine-day { background: var(--accent-day-dim); border-color: var(--accent-day-border); }
.slot.mine-night { background: var(--accent-night-dim); border-color: var(--accent-night-border); }

.slot-time { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.slot-who { font-size: 12px; color: var(--muted); min-height: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.slot-who.booked-day { color: var(--accent-day); font-weight: 500; }
.slot-who.booked-night { color: var(--accent-night); font-weight: 500; }
.slot-who.cross { color: var(--warn); font-size: 11px; }

.slot-btn { margin-top: 8px; width: 100%; padding: 5px 0; font-size: 11px; font-family: var(--mono); border-radius: 5px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.13s; letter-spacing: 0.03em; }
.slot-btn.day:hover:not(:disabled) { border-color: var(--accent-day-border); color: var(--accent-day); background: var(--accent-day-dim); }
.slot-btn.night:hover:not(:disabled) { border-color: var(--accent-night-border); color: var(--accent-night); background: var(--accent-night-dim); }
.slot-btn:disabled { opacity: 0.28; cursor: not-allowed; }
.slot-btn.cancel { border-color: rgba(248,113,113,0.3); color: var(--danger); }
.slot-btn.cancel:hover { background: var(--danger-dim); border-color: var(--danger); }

.slot.emergency { border-color: rgba(251,191,36,0.3); }
.slot-btn.emergency-btn {
  border-color: rgba(251,191,36,0.4);
  color: var(--warn);
}
.slot-btn.emergency-btn:hover:not(:disabled) {
  border-color: var(--warn);
  background: var(--warn-dim);
  color: var(--warn);
}

.no-lunch-notice {
  background: var(--surface);
  border: 1px dashed var(--border2);
  border-radius: 10px;
  padding: 18px 20px;
  font-size: 13px;
  color: var(--muted);
  font-family: var(--mono);
  text-align: center;
  margin-top: 4px;
}

/* LOG PANEL */
.log-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); }
.log-overlay.active { display:flex; align-items:flex-end; justify-content:flex-end; }
.log-panel {
  background: var(--surface);
  border-left: 1px solid var(--border2);
  height: 100vh;
  width: 380px;
  max-width: 100vw;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.log-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.log-head-title { font-size: 14px; font-weight: 500; color: var(--text); font-family: var(--mono); }
.log-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 4px; }
.log-close:hover { color: var(--text); }
.log-body { flex: 1; overflow-y: auto; padding: 12px 0; }
.log-empty { text-align: center; color: var(--muted); font-size: 13px; font-family: var(--mono); padding: 40px 20px; }
.log-entry {
  padding: 10px 20px;
  border-bottom: 0.5px solid var(--border);
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 10px;
  align-items: start;
}
.log-time { font-size: 11px; font-family: var(--mono); color: var(--muted); padding-top: 2px; }
.log-info { }
.log-op { font-size: 13px; font-weight: 500; color: var(--text); }
.log-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }
.log-action-book { color: var(--accent-day); }
.log-action-cancel { color: var(--danger); }
.log-badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 4px;
  font-family: var(--mono);
}
.log-badge-sg { background: var(--accent-day-dim); color: var(--accent-day); }
.log-badge-nc { background: var(--danger-dim); color: var(--danger); }
.log-badge-vip { background: rgba(251,191,36,0.12); color: var(--warn); }
.log-refresh { display: flex; align-items: center; gap: 6px; background: none; border: 0.5px solid var(--border2); border-radius: 6px; color: var(--muted); font-size: 11px; font-family: var(--mono); padding: 4px 10px; cursor: pointer; }
.log-refresh:hover { color: var(--text); border-color: var(--border2); }

/* ── ADMIN PANEL ── */
.admin-overlay { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:20px; }
.admin-overlay.active { display:flex; }
.admin-panel { background:var(--surface); border:1px solid var(--border2); border-radius:14px; width:560px; max-width:100%; max-height:90vh; display:flex; flex-direction:column; overflow:hidden; }
.admin-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.admin-head-title { font-size:14px; font-weight:500; color:var(--warn); font-family:var(--mono); }
.admin-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); flex-shrink:0; }
.admin-tab { padding:10px 18px; font-size:12px; font-family:var(--mono); color:var(--muted); background:none; border:none; cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; }
.admin-tab.active { color:var(--warn); border-bottom-color:var(--warn); }
.admin-body { flex:1; overflow-y:auto; padding:20px; }

/* operator pick modal */
.op-pick-overlay { display:none; position:fixed; inset:0; z-index:400; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
.op-pick-overlay.active { display:flex; }
.op-pick-box { background:var(--surface); border:1px solid var(--border2); border-radius:12px; padding:20px; width:320px; max-width:95vw; }
.op-pick-box h3 { font-size:13px; font-family:var(--mono); color:var(--text); margin-bottom:12px; }
.op-pick-box select { width:100%; padding:8px 10px; background:var(--surface2); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-size:14px; margin-bottom:12px; }
.op-pick-btns { display:flex; gap:8px; justify-content:flex-end; }
.op-pick-btns button { padding:7px 16px; font-size:13px; font-family:var(--mono); border-radius:8px; border:1px solid var(--border2); background:transparent; color:var(--muted); cursor:pointer; }
.op-pick-btns .confirm { background:rgba(251,191,36,0.12); border-color:rgba(251,191,36,0.35); color:var(--warn); }

/* transfer list */
.transfer-list { display:flex; flex-direction:column; gap:6px; }
.transfer-item { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--surface2); border-radius:8px; font-size:13px; }
.transfer-badge { font-size:10px; font-family:var(--mono); padding:2px 7px; border-radius:4px; margin-left:6px; }
.transfer-btn { font-size:11px; font-family:var(--mono); padding:4px 10px; border-radius:6px; border:1px solid var(--border2); background:transparent; color:var(--muted); cursor:pointer; }
.transfer-btn:hover { color:var(--warn); border-color:rgba(251,191,36,0.35); }

/* roster editor */
.roster-section { margin-bottom:20px; }
.roster-title { font-size:11px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
.roster-list { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.roster-chip { display:inline-flex; align-items:center; gap:4px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:3px 10px; font-size:12px; }
.roster-chip button { background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; padding:0 2px; line-height:1; }
.roster-chip button:hover { color:var(--danger); }
.roster-add { display:flex; gap:6px; margin-top:4px; }
.roster-add input { flex:1; padding:6px 10px; background:var(--surface2); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-size:13px; }
.roster-add button { padding:6px 14px; font-size:12px; font-family:var(--mono); background:rgba(110,231,183,0.1); border:1px solid var(--accent-day-border); border-radius:8px; color:var(--accent-day); cursor:pointer; }

@media(max-width:600px) {
  .header { padding: 12px 14px; }
  .main { padding: 14px; }
}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
  <div class="logo"><span class="logo-dot"></span>break<span id="logo-accent" style="color:var(--accent-day)">.</span>desk</div>
  <div id="sync-status" style="font-size:11px;font-family:var(--mono);color:var(--muted);display:flex;align-items:center;gap:5px">
    <span id="sync-dot" style="width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block"></span>
    <span id="sync-text">подключение...</span>
  </div>
</div>
  <div class="controls">
    <div class="seg">
      <button class="seg-btn active-day" id="btn-sect-sg" onclick="setSection('sg')">SG</button>
      <button class="seg-btn" id="btn-sect-nc" onclick="setSection('nc')">NC</button>
    </div>
    <div class="seg" id="dept-seg">
      <button class="seg-btn active-day" id="btn-dept-regular" onclick="setDept('regular')">Regular</button>
      <button class="seg-btn" id="btn-dept-vip" onclick="setDept('vip')">★ VIP</button>
    </div>
    <div class="op-wrap">
      <select id="opsel" onchange="setOp(this.value)">
        <option value="">— оператор —</option>
      </select>
      <span class="select-arrow">▼</span>
    </div>
    <div id="op-badge" class="op-badge"></div>
    <button id="admin-btn" onclick="openAdminPanel()" style="display:none;padding:7px 14px;font-size:12px;font-family:var(--mono);background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.3);border-radius:8px;color:var(--warn);cursor:pointer;white-space:nowrap">★ админ</button>
    <button onclick="openLog()" style="padding:7px 14px;font-size:12px;font-family:var(--mono);background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--muted);cursor:pointer;white-space:nowrap" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">☰ лог</button>
    <div style="display:flex;align-items:center;gap:4px">
      <button id="notif-btn" onclick="toggleNotifications()" title="Включить/выключить уведомления" style="padding:7px 14px;font-size:12px;font-family:var(--mono);background:var(--surface2);border:1px solid var(--border2);border-radius:8px 0 0 8px;border-right:none;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s">🔔</button>
      <button class="notif-timing-btn" data-min="1" onclick="setNotifTiming(1)" style="padding:7px 8px;font-size:11px;font-family:var(--mono);background:var(--surface2);border:1px solid var(--border2);border-right:none;color:var(--muted);cursor:pointer">1м</button>
      <button class="notif-timing-btn" data-min="2" onclick="setNotifTiming(2)" style="padding:7px 8px;font-size:11px;font-family:var(--mono);background:var(--surface2);border:1px solid var(--accent-day-border);color:var(--accent-day);cursor:pointer;border-right:none">2м</button>
      <button class="notif-timing-btn" data-min="5" onclick="setNotifTiming(5)" style="padding:7px 8px;font-size:11px;font-family:var(--mono);background:var(--surface2);border:1px solid var(--border2);border-right:none;color:var(--muted);cursor:pointer">5м</button>
      <button class="notif-timing-btn" data-min="10" onclick="setNotifTiming(10)" style="padding:7px 8px;font-size:11px;font-family:var(--mono);background:var(--surface2);border:1px solid var(--border2);border-radius:0 8px 8px 0;color:var(--muted);cursor:pointer">10м</button>
    </div>

    <div class="seg">
      <button class="seg-btn active-day" id="btn-day" onclick="setShiftType('day')">☀ День</button>
      <button class="seg-btn" id="btn-night" onclick="setShiftType('night')">☽ Ночь</button>
    </div>

    <div class="seg" id="day-seg">
      <button class="seg-btn active-day" id="btn-921" onclick="setShift('9-21')">09–21</button>
      <button class="seg-btn" id="btn-1224" onclick="setShift('12-24')">12–00</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="summary" id="summary"></div>
  <div id="board"></div>
</div>

<script>
const OPERATORS = {
  sg: {
    regular: ['Balfour','Bill','Bob','Bowen','Bridget','Calvin','Charles','Colin','Earl','Fletcher','Florence','Gross','Hardy','Jonathan','Joseph','Kenzo','Lex','Meadow','Mike','Murphy','Nora','Norman','Robert','Robin','Rudy','Sherlock','Will'],
    vip:     ['Alexia','Ashton','Casper','Chadwick','Christine','Denzel','Elijah','Fabio','Felicia','Holly','Isaac','Kiana','Morgan','Nolan','Plover','Reggie','River','Scott','Simon','Skylar','Tom','Trinity','Wade','Warren'],
  },
  nc: {
    regular: ['Caleb','Grant','Shin','Frey','Luciana','Hector','Max','Leo','Debra','Quinn','Evelyn','Taylor','Ren'],
  },
};

// Ночные перерывы по скрину: 22,23,0,1,2,3,4,5,6,7 + 8:xx только до 8:20
// Делаем 22-23 полные (по 4 слота), затем 0-7 полные, затем 8 только :10 :20
const NIGHT_BREAK_GROUPS = [
  {label:'22:xx', hh:'22', slots:['22:10','22:40']},
  {label:'23:xx', hh:'23', slots:['23:10','23:40']},
  {label:'00:xx', hh:'00', slots:['00:10','00:40']},
  {label:'01:xx', hh:'01', slots:['01:10','01:40']},
  {label:'02:xx', hh:'02', slots:['02:10','02:20','02:30','02:40']},
  {label:'03:xx', hh:'03', slots:['03:10','03:20','03:30','03:40']},
  {label:'04:xx', hh:'04', slots:['04:10','04:20','04:30','04:40']},
  {label:'05:xx', hh:'05', slots:['05:10','05:20','05:30','05:40']},
  {label:'06:xx', hh:'06', slots:['06:10','06:40']},
  {label:'07:xx', hh:'07', slots:['07:10','07:40']},
  {label:'08:xx', hh:'08', slots:['08:00','08:10','08:20']},
];

function makeBreakGroups(hours) {
  return hours.map(h => {
    const hh = String(h).padStart(2,'0');
    return { label: hh+':xx', hh, slots: [hh+':10', hh+':20', hh+':30', hh+':40'] };
  });
}
function makeLunchSlots(hours) {
  if (!hours) return [];
  return hours.map(h => String(h).padStart(2,'0') + ':00');
}

// SHIFT CONFIG
// lunchHours: null = нет обедов
// crossShift: какую смену смотреть при кросс-блокировке (слоты с совпадающим временем)
const SHIFT_CFG = {

function setSyncStatus(state) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if (!dot || !txt) return;
  const map = {
    connecting: ['var(--muted)',      'подключение...'],
    online:     ['var(--accent-day)', 'онлайн'],
    saving:     ['var(--warn)',        'сохранение...'],
    offline:    ['var(--danger)',      'офлайн'],
  };
  const [color, label] = map[state] || ['var(--muted)', state];
  dot.style.background = color;
  txt.textContent = label;
}

function initWorker() {
  setSyncStatus('connecting');
  fetch(WORKER_URL + '/bookings')
    .then(r => r.json())
    .then(data => {
      bookings = data || {};
      lastServerBookings = JSON.parse(JSON.stringify(bookings)); // snapshot of server state
      loadTransfers();
      loadRoster();
      setSyncStatus('online');
      render();
      // Poll every 10 seconds to catch bookings from other users
      setInterval(pollBookings, 10000);
    })
    .catch(() => {
      setSyncStatus('offline');
      render(); // render locally
    });
}

function pollBookings() {
  // Skip poll if we saved very recently (within POLL_BLOCK_MS)
  if (syncTimer) return;
  if (Date.now() - lastSaveTime < POLL_BLOCK_MS) return;
  fetch(WORKER_URL + '/bookings')
    .then(r => r.json())
    .then(data => {
      const serverData = data || {};
      
      // Protect all bookings belonging to current operator from being overwritten
      // by a stale server response (race condition protection)
      if (currentOp) {
        Object.entries(bookings).forEach(([k, v]) => {
          if (typeof v === 'string' && v === currentOp) {
            // Keep our booking if server doesn't have it
            if (!serverData[k]) serverData[k] = v;
          }
        });
      }
      
      bookings = serverData;
      lastServerBookings = JSON.parse(JSON.stringify(serverData)); // keep server snapshot in sync
      loadTransfers();
      setSyncStatus('online');
      render();
    })
    .catch(() => setSyncStatus('offline'));
}

// Track last known server state to compute deltas
let lastServerBookings = {};

function saveBookings() {
  setSyncStatus('saving');

  clearTimeout(syncTimer);
  // Debounce 300ms to batch rapid clicks
  syncTimer = setTimeout(() => {
    // Compute delta: what changed vs last known server state
    const toSet = {};
    const toDel = [];

    // Keys added or changed locally
    for (const [k, v] of Object.entries(bookings)) {
      if (JSON.stringify(lastServerBookings[k]) !== JSON.stringify(v)) {
        toSet[k] = v;
      }
    }
    // Keys deleted locally
    for (const k of Object.keys(lastServerBookings)) {
      if (!(k in bookings)) {
        toDel.push(k);
      }
    }

    if (Object.keys(toSet).length === 0 && toDel.length === 0) {
      setSyncStatus('online');
      syncTimer = null;
      return;
    }

    fetch(WORKER_URL + '/bookings', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ set: toSet, del: toDel }),
    })
      .then(r => {
        if (r.ok) {
          // Update our "last known server state" to current bookings
          lastServerBookings = JSON.parse(JSON.stringify(bookings));
          setSyncStatus('online');
          lastSaveTime = Date.now();
          syncTimer = null;
        } else {
          setSyncStatus('offline');
        }
      })
      .catch(() => setSyncStatus('offline'));
  }, 300);
}

function loadLog() {

  body.innerHTML = '<div class="log-empty">загрузка...</div>';
  
  const now = kyivMinutes();
  const titleEl = document.querySelector('.log-head-title');

  // Для ночной смены (21-09) лог может быть разбит на 2 дня:
  // - до полуночи: записан в "вчера" (когда смена началась)
  // - после полуночи: записан в "сегодня" (Kyiv)
  // Нам нужно показать ОБА куска.
  if (currentShift === 'night') {
    if (titleEl) titleEl.textContent = 'Лог ночной смены';

    const kyivToday = new Date().toLocaleDateString('en-CA', { timeZone: 'Europe/Kiev' });
    const [y, mo, d] = kyivToday.split('-').map(Number);
    const prevDate = new Date(y, mo - 1, d - 1).toLocaleDateString('en-CA');

    // Fetch both days and merge
    Promise.all([
      fetch(`${WORKER_URL}/log?date=${kyivToday}`).then(r => r.json()).catch(() => []),
      fetch(`${WORKER_URL}/log?date=${prevDate}`).then(r => r.json()).catch(() => []),
    ]).then(([todayEntries, yesterdayEntries]) => {
      // Filter: only show night-shift entries (shift === 'night')
      const all = [...todayEntries, ...yesterdayEntries].filter(e => e.shift === 'night');
      renderLogEntries(body, all);
    });
    return;
  }

  if (titleEl) titleEl.textContent = 'Лог за сегодня';
  fetch(`${WORKER_URL}/log`)
    .then(r => r.json())
    .then(entries => renderLogEntries(body, entries))
    .catch(() => { body.innerHTML = '<div class="log-empty">ошибка загрузки</div>'; });
}

function bKey(shift, time) { return currentSection + '|' + currentDept + '|' + shift + '|b|' + time; }
function lKey(shift, time) { return currentSection + '|' + currentDept + '|' + shift + '|l|' + time; }

function myBreaksCount() {
  return Object.entries(bookings).filter(([k,v]) => k.startsWith(currentSection+'|'+currentDept+'|'+currentShift+'|b|') && v === currentOp).length;
}

// Convert "HH:MM" to minutes. Night shift: times 00-08 treated as 24-32h so they sort after 22-23.
function toMin(time, shiftId) {
  const [h, m] = time.split(':').map(Number);
  let total = h * 60 + m;
  // For night shift, hours 0-8 are "next day" — add 24h
  if (shiftId === 'night' && h < 12) total += 24 * 60;
  return total;
}

// Returns the closest existing break OR lunch of current operator (in minutes), or null
function closestMyBookingDistance(time) {
  const prefix = currentSection + '|' + currentDept + '|' + currentShift + '|';
  const myTimes = Object.entries(bookings)
    .filter(([k, v]) => v === currentOp && (k.startsWith(prefix + 'b|') || k.startsWith(prefix + 'l|')))
    .map(([k]) => k.includes('|b|') ? k.split('|b|')[1] : k.split('|l|')[1]);
  if (!myTimes.length) return null;
  const t = toMin(time, currentShift);
  return Math.min(...myTimes.map(bt => Math.abs(toMin(bt, currentShift) - t)));
}

// True if placing a break/lunch at `time` would be within 60 min of any existing break/lunch
function tooClose(time) {
  const dist = closestMyBookingDistance(time);
  return dist !== null && dist < 60;
}

// Get all break slots for current shift as flat array
function allBreakSlots() {
  return (currentSection === 'nc' ? NC_SHIFT_CFG : SHIFT_CFG)[currentShift].breakGroups.reduce((arr, g) => arr.concat(g.slots), []);
}

// Returns true if ALL remaining free slots are blocked by the 60-min rule for this operator
// (used to unlock "emergency" booking ignoring the interval rule)
function noValidSlotsLeft() {
  if (!currentOp) return false;
  const mb = myBreaksCount();
  if (mb >= MAX_BREAKS) return false;
  return allBreakSlots().every(time => {
    const k = bKey(currentShift, time);
    const who = bookings[k];
    if (who) return true;             // taken by someone
    if (crossBlockedBy(time)) return true; // cross-blocked
    if (!tooClose(time)) return false; // this slot IS available — not all blocked
    return true;                       // tooClose — counts as blocked
  });
}

function myLunchCount() {
  return Object.entries(bookings).filter(([k,v]) => k.startsWith(currentSection+'|'+currentDept+'|'+currentShift+'|l|') && v === currentOp).length;
}

// Кросс-блокировка: 9-21 и 12-24 блокируют один слот друг у друга
// Работает внутри одной секции (sg/nc) и одного отдела (regular/vip)
// NC и VIP независимы от других отделов
function crossBlockedBy(time) {
  // Only 9-21 <-> 12-24 cross-block each other
  const crossMap = { '9-21': '12-24', '12-24': '9-21' };
  const crossShift = crossMap[currentShift];
  if (!crossShift) return null; // night has no cross-shift

  // Build the cross key: same section|dept, different shift
  const crossKey = currentSection + '|' + currentDept + '|' + crossShift + '|b|' + time;
  return bookings[crossKey] || null;
}

function bookBreak(time, forceOverride) {
  if (!currentOp) { alert('Выберите оператора'); return; }
  const admin = isAdmin();
  if (!admin && !shiftBookingAllowed(currentShift)) {
    const labels = { '9-21': '08:45', '12-24': '11:45', 'night': '20:45' };
    alert('Бронирование открывается в ' + (labels[currentShift] || '') + ' по Киеву');
    return;
  }
  const k = bKey(currentShift, time);
  if (!admin) {
    if (crossBlockedBy(time)) { alert('Слот ' + time + ' занят оператором смежной смены'); return; }
    if (bookings[k]) return;
    if (myBreaksCount() >= MAX_BREAKS) { alert('Лимит: 4 перерыва на смену'); return; }
    if (tooClose(time) && !forceOverride) { alert('Между перерывами должен быть минимум 1 час'); return; }
  }
  bookings[k] = currentOp; saveBookings(); logAction('book_break', time); render();
}
function cancelBreak(time) {
  // Regular user cancels their own booking (find their key)
  const baseKey = bKey(currentShift, time);
  const occupants = getSlotOccupants(baseKey);
  const myEntry = occupants.find(o => o.name === currentOp);
  if (myEntry) {
    delete bookings[myEntry.key];
    // Compact remaining entries to fill gaps
    compactSlotKeys(baseKey);
    saveBookings();
    logAction('cancel_break', time);
    render();
  }
}

function adminCancelBreak(fullKey) {
  // Admin cancels by full key (base or indexed)
  const who = bookings[fullKey];
  if (!who) return;
  // Extract base key (remove |N suffix if present)
  const baseKey = fullKey.replace(/\|\d+$/, '');
  delete bookings[fullKey];
  compactSlotKeys(baseKey);
  saveBookings();
  logAction('cancel_break', '[admin cancelled: ' + who + ']');
  render();
}

function compactSlotKeys(baseKey) {
  // After deletion, compact |1, |2... to avoid gaps
  const names = [];
  if (bookings[baseKey]) names.push(bookings[baseKey]);
  let i = 1;
  while (bookings[baseKey + '|' + i] !== undefined) {
    if (bookings[baseKey + '|' + i]) names.push(bookings[baseKey + '|' + i]);
    delete bookings[baseKey + '|' + i];
    i++;
  }
  // Re-assign compactly
  if (names.length > 0) bookings[baseKey] = names[0];
  else delete bookings[baseKey];
  for (let j = 1; j < names.length; j++) {
    bookings[baseKey + '|' + j] = names[j];
  }
}
function bookLunch(time) {
  if (!currentOp) { alert('Выберите оператора'); return; }
  const admin = isAdmin();
  if (!admin && !shiftBookingAllowed(currentShift)) {
    const labels = { '9-21': '08:45', '12-24': '11:45', 'night': '20:45' };
    alert('Бронирование открывается в ' + (labels[currentShift] || '') + ' по Киеву');
    return;
  }
  const k = lKey(currentShift, time);
  if (!admin) {
    if (bookings[k]) return;
    if (myLunchCount() >= MAX_LUNCHES) { alert('Обед уже забронирован'); return; }
    if (tooClose(time)) { alert('Между перерывами и обедом должен быть минимум 1 час'); return; }
  }
  bookings[k] = currentOp; saveBookings(); logAction('book_lunch', time); render();
}
function cancelLunch(time) {
  const baseKey = lKey(currentShift, time);
  const occupants = getSlotOccupants(baseKey);
  const myEntry = occupants.find(o => o.name === currentOp);
  if (myEntry) {
    delete bookings[myEntry.key];
    compactSlotKeys(baseKey);
    saveBookings();
    logAction('cancel_lunch', time);
    render();
  }
}

function adminCancelLunch(fullKey) {
  const who = bookings[fullKey];
  if (!who) return;
  const baseKey = fullKey.replace(/\|\d+$/, '');
  delete bookings[fullKey];
  compactSlotKeys(baseKey);
  saveBookings();
  logAction('cancel_lunch', '[admin cancelled: ' + who + ']');
  render();
}

function getSlotOccupants(baseKey) {
  // Returns array of all names booked in this slot (base + extras)
  const names = [];
  if (bookings[baseKey]) names.push({ key: baseKey, name: bookings[baseKey] });
  let i = 1;
  while (bookings[baseKey + '|' + i]) {
    names.push({ key: baseKey + '|' + i, name: bookings[baseKey + '|' + i] });
    i++;
    if (i > 10) break;
  }
  return names;
}

function renderSlotBreak(time, hh, emergencyMode) {
  const a = ac();
  const mb = myBreaksCount();
  const tooNear = currentOp && tooClose(time);
  const baseKey = bKey(currentShift, time);
  const occupants = getSlotOccupants(baseKey);
  const crossWho = occupants.length === 0 ? crossBlockedBy(time) : null;
  const myEntry = occupants.find(o => o.name === currentOp);
  const isMe = !!myEntry;
  const takenByOther = occupants.length > 0 && !isMe;
  const taken = occupants.length > 0;

  let cls = 'slot ';
  if (isMe) cls += 'mine-'+a;
  else if (taken) cls += 'taken';
  else if (crossWho) cls += 'cross-blocked';
  else if (tooNear && emergencyMode) cls += 'free emergency';
  else cls += 'free';

  const canBook = currentOp && !isMe && mb < MAX_BREAKS && !crossWho && (!tooNear || emergencyMode);

  // Who line: show all occupants
  let whoLine = '';
  if (occupants.length > 0) {
    whoLine = occupants.map(o =>
      `<div class="slot-who booked-${a}" style="font-size:11px">${o.name}</div>`
    ).join('');
  } else if (crossWho) {
    const crossLabel = currentShift === '9-21' ? '12–00' : '09–21';
    whoLine = `<div class="slot-who cross">${crossLabel}: ${crossWho}</div>`;
  } else if (tooNear && emergencyMode) {
    whoLine = `<div class="slot-who" style="color:var(--warn);font-size:11px">↯ вне очереди</div>`;
  } else {
    whoLine = `<div class="slot-who">свободно</div>`;
  }

  let btn = '';
  if (isMe) {
    btn = `<button class="slot-btn cancel" onclick="cancelBreak('${time}')">отменить</button>`;
  } else if (isAdmin()) {

    // Cancel buttons for each occupant
    occupants.forEach(o => {
      adminBtns += `<button class="slot-btn cancel" onclick="adminCancelBreak('${o.key}')" style="margin-bottom:3px;font-size:10px">✕ ${o.name}</button>`;
    });

    btn = `<button class="slot-btn ${a}${tooNear && emergencyMode ? ' emergency-btn' : ''}" onclick="${fn}" ${!canBook?'disabled':''}>занять</button>`;
  }

  return `<div class="${cls}">
    <div class="slot-time">${time}</div>
    ${whoLine}${btn}
  </div>`;
}

function renderSlotLunch(time) {

// ── KYIV TIME HELPERS ─────────────────────────────────────────
function kyivNow() {
  // Returns current time as Date object in Kyiv timezone
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Kiev' }));
}

function kyivMinutes() {
  // Total minutes since midnight in Kyiv time
  const d = kyivNow();
  return d.getHours() * 60 + d.getMinutes();
}

// Shift open times (booking allowed from 15 min before shift start)
// Returns true if current Kyiv time allows booking for the given shift
function shiftBookingAllowed(shiftId) {
  const now = kyivMinutes();
  if (shiftId === '9-21')   return now >= (8 * 60 + 45);   // 08:45
  if (shiftId === '12-24')  return now >= (11 * 60 + 45);  // 11:45
  // Ночь: с 20:45 до 09:00 (через полночь)
  if (shiftId === 'night')  return now >= (20 * 60 + 45) || now < (9 * 60);
  return true;
}

let notifAheadMin = 2; // default 2 minutes

function setNotifTiming(min) {
  notifAheadMin = min;
  document.querySelectorAll('.notif-timing-btn').forEach(b => {
    const active = parseInt(b.dataset.min) === min;
    b.style.color = active ? 'var(--accent-day)' : 'var(--muted)';
    b.style.borderColor = active ? 'var(--accent-day-border)' : 'rgba(255,255,255,0.13)';
    b.style.background = active ? 'var(--accent-day-dim)' : 'var(--surface2)';
  });
}

function adminBook(type, time) {
  const doBook = (name) => {
    // Admin: add as additional booking if slot already taken
    const baseKey = type === 'break' ? bKey(currentShift, time) : lKey(currentShift, time);
    // Find next free index (0 = base key, 1+ = base key + "|N")
    let k = baseKey;
    let idx = 1;
    while (bookings[k] && bookings[k] !== name) {
      k = baseKey + '|' + idx;
      idx++;
      if (idx > 10) break; // safety
    }
    bookings[k] = name;
    saveBookings();
    logAction(type === 'break' ? 'book_break' : 'book_lunch', time + ' [admin: ' + name + ']');
    render();
  };

  if (currentOp) {
    doBook(currentOp);
  } else {
    openOpPick(name => doBook(name));
  }
}

function adminOverrideBreak(time) {
  if (!isAdmin()) return;
  const k = bKey(currentShift, time);
  const who = bookings[k];
  if (who) { delete bookings[k]; saveBookings(); logAction('cancel_break', time + ' [admin override, was: ' + who + ']'); render(); }
  else { bookings[k] = currentOp; saveBookings(); logAction('book_break', time + ' [admin override]'); render(); }
}

let notificationsEnabled = false;
let notifTimer = null;
// NOTIF_AHEAD_MIN is dynamic via notifAheadMin variable
const firedNotifs = new Set(); // track already fired: "shiftId|type|time"

function toggleNotifications() {
  if (!('Notification' in window)) {
    alert('Ваш браузер не поддерживает уведомления');
    return;
  }
  if (notificationsEnabled) {
    notificationsEnabled = false;
    clearInterval(notifTimer);
    notifTimer = null;
    updateNotifBtn();
    return;
  }
  Notification.requestPermission().then(perm => {
    if (perm === 'granted') {
      notificationsEnabled = true;
      startNotifTimer();
      updateNotifBtn();
      new Notification('break.desk', {
        body: `Уведомления включены — напомним за ${notifAheadMin} мин до перерыва или обеда`,
        icon: '',
      });
    } else {
      alert('Разрешите уведомления в настройках браузера');
    }
  });
}

function updateNotifBtn() {
  const btn = document.getElementById('notif-btn');
  if (!btn) return;
  if (notificationsEnabled) {
    btn.textContent = '🔔 вкл';
    btn.style.color = 'var(--accent-day)';
    btn.style.borderColor = 'var(--accent-day-border)';
  } else {
    btn.textContent = '🔔 уведомления';
    btn.style.color = '';
    btn.style.borderColor = '';
  }
}

function startNotifTimer() {
  checkUpcomingBookings(); // run immediately
  notifTimer = setInterval(checkUpcomingBookings, 30000); // check every 30s
}

function checkUpcomingBookings() {
  if (!notificationsEnabled || !currentOp) return;

  const kyiv = new Date(new Date().toLocaleString('en-US', { timeZone: 'Europe/Kiev' }));
  const nowMin = kyiv.getHours() * 60 + kyiv.getMinutes();

  const prefix = currentSection + '|' + currentDept + '|' + currentShift + '|';

  Object.entries(bookings).forEach(([k, v]) => {
    if (v !== currentOp) return;
    const isBreak = k.startsWith(prefix + 'b|');
    const isLunch = k.startsWith(prefix + 'l|');
    if (!isBreak && !isLunch) return;

    const timeStr = isBreak ? k.split('|b|')[1] : k.split('|l|')[1];
    if (!timeStr) return;

    const [hh, mm] = timeStr.split(':').map(Number);
    let slotMin = hh * 60 + mm;
    // Night shift: hours 0-8 are next day
    if (currentShift === 'night' && hh < 12) slotMin += 24 * 60;

    const diff = slotMin - nowMin;
    const notifKey = k;

    if (diff > 0 && diff <= notifAheadMin && !firedNotifs.has(notifKey)) {
      firedNotifs.add(notifKey);
      const typeLabel = isBreak ? 'Перерыв' : 'Обед';
      new Notification(`☕ ${typeLabel} через ${diff} мин`, {
        body: `${currentOp} · ${timeStr} · смена ${currentShift === '9-21' ? '09–21' : currentShift === '12-24' ? '12–00' : 'Ночь'} · за ${notifAheadMin} мин`,
        icon: '',
        tag: notifKey,
      });
    }

    // Clear fired notif after slot time passes (so it can fire again if re-booked)
    if (diff < -5) firedNotifs.delete(notifKey);
  });
}

function doTransfer2(key, targetVal, name, toSection, toDept) {
  loadTransfers();
  transfers[key] = targetVal;
  saveTransfers();
  // Add to target list temporarily if not there
  if (toSection === 'sg' && toDept === 'vip' && !OPERATORS.sg.vip.includes(name)) OPERATORS.sg.vip.push(name);
  if (toSection === 'sg' && toDept === 'regular' && !OPERATORS.sg.regular.includes(name)) OPERATORS.sg.regular.push(name);
  if (toSection === 'nc' && toDept === 'regular' && !OPERATORS.nc.regular.includes(name)) OPERATORS.nc.regular.push(name);
  populateOperators();
  renderTransferTab(document.getElementById('adminBody'));
}

function revertTransfer2(key) {
  loadTransfers();
  const targetVal = transfers[key];
  delete transfers[key];
  saveTransfers();
  // Remove from target list to avoid duplicates
  if (targetVal) {
    const [toSection, toDept] = targetVal.split('|');
    // Get the name from the key: section|dept|name
    const name = key.split('|').slice(2).join('|');
    if (toSection === 'sg' && toDept === 'vip')
      OPERATORS.sg.vip = OPERATORS.sg.vip.filter(n => n !== name || OPERATORS.sg.vip.indexOf(n) !== OPERATORS.sg.vip.lastIndexOf(n));
    if (toSection === 'sg' && toDept === 'regular')
      OPERATORS.sg.regular = OPERATORS.sg.regular.filter(n => n !== name || OPERATORS.sg.regular.indexOf(n) !== OPERATORS.sg.regular.lastIndexOf(n));
    if (toSection === 'nc' && toDept === 'regular')
      OPERATORS.nc.regular = OPERATORS.nc.regular.filter(n => n !== name || OPERATORS.nc.regular.indexOf(n) !== OPERATORS.nc.regular.lastIndexOf(n));
  }
  populateOperators();
  renderTransferTab(document.getElementById('adminBody'));
}

function doTransfer(name, toDept) {
  loadTransfers();
  transfers[name] = toDept;
  saveTransfers();
  // Add to target dept list temporarily
  if (toDept === 'vip' && !OPERATORS.sg.vip.includes(name)) OPERATORS.sg.vip.push(name);
  if (toDept === 'regular' && !OPERATORS.sg.regular.includes(name)) OPERATORS.sg.regular.push(name);
  populateOperators();
  renderTransferTab(document.getElementById('adminBody'));
}

function revertTransfer(name) {
  loadTransfers();
  const toDept = transfers[name];
  delete transfers[name];
  saveTransfers();
  // Remove from target list
  if (toDept === 'vip') OPERATORS.sg.vip = OPERATORS.sg.vip.filter(n => n !== name || OPERATORS.sg.vip.filter(x=>x===name).length > 1);
  if (toDept === 'regular') OPERATORS.sg.regular = OPERATORS.sg.regular.filter(n => n !== name || OPERATORS.sg.regular.filter(x=>x===name).length > 1);
  populateOperators();
  renderTransferTab(document.getElementById('adminBody'));
}

function renderRosterTab(body) {
  const sections = [
    { key: 'sg_regular', list: OPERATORS.sg.regular, label: 'SG · Regular' },
    { key: 'sg_vip',     list: OPERATORS.sg.vip,     label: 'SG · VIP' },
    { key: 'nc_regular', list: OPERATORS.nc.regular,  label: 'NC · Regular' },
  ];

  let html = '<div style="font-size:11px;color:var(--danger);font-family:var(--mono);margin-bottom:16px;padding:8px 12px;background:var(--danger-dim);border-radius:8px">⚠ Постоянное изменение списка — сохраняется навсегда</div>';

  sections.forEach(({ key, list, label }) => {
    html += '<div class="roster-section"><div class="roster-title">' + label + '</div>';
    html += '<div class="roster-list" id="roster-' + key + '">';
    list.forEach(name => {
      html += '<span class="roster-chip">' + name +
        '<button onclick="removeOperator(\'' + key + '\',\'' + name + '\')">✕</button>' +
        '</span>';
    });
    html += '</div>';
    html += '<div class="roster-add">' +
      '<input type="text" id="new-op-' + key + '" placeholder="\u0418\u043c\u044f \u043e\u043f\u0435\u0440\u0430\u0442\u043e\u0440\u0430" onkeydown="if(event.keyCode===13)addOperator(\'' + key + '\')">' +
      '<button onclick="addOperator(\'' + key + '\')">+ добавить</button>' +
      '</div></div>';
  });
  body.innerHTML = html;
}

function addOperator(key) {
  const inp = document.getElementById('new-op-' + key);
  const name = inp.value.trim();
  if (!name) return;
  const map = { sg_regular: OPERATORS.sg.regular, sg_vip: OPERATORS.sg.vip, nc_regular: OPERATORS.nc.regular };
  if (!map[key].includes(name)) { map[key].push(name); map[key].sort(); }
  inp.value = '';
  saveRoster();
  populateOperators();
  renderRosterTab(document.getElementById('adminBody'));
}

function removeOperator(key, name) {
  if (!confirm('Удалить "' + name + '" из списка? Это нельзя отменить.')) return;
  const map = { sg_regular: OPERATORS.sg.regular, sg_vip: OPERATORS.sg.vip, nc_regular: OPERATORS.nc.regular };
  map[key] = map[key].filter(n => n !== name);
  OPERATORS.sg.regular = map.sg_regular; OPERATORS.sg.vip = map.sg_vip; OPERATORS.nc.regular = map.nc_regular;
  saveRoster();
  populateOperators();
  renderRosterTab(document.getElementById('adminBody'));
}

populateOperators();

// Get auth session to identify who is making changes
fetch('/api/check', { credentials: 'include' })
  .then(r => r.json())
  .then(data => {
    if (data.ok && data.email) {
      userEmail = data.email;
      
      // Auto-select operator based on email (for non-admins)
      const operatorName = EMAIL_TO_OPERATOR[userEmail];
      
      if (isAdmin()) {
        // Admin badge
        const badge = document.createElement('span');
        badge.textContent = '★ admin';
        badge.style.cssText = 'font-size:10px;font-family:var(--mono);background:rgba(251,191,36,0.12);color:var(--warn);border:1px solid rgba(251,191,36,0.3);border-radius:4px;padding:2px 7px;margin-left:4px';
        document.getElementById('op-badge').after(badge);
        document.getElementById('admin-btn').style.display = 'block';
        
        // Admins can select any operator freely
      } else if (operatorName) {
        // Non-admin: auto-select their operator and lock the selector
        autoSelectOperator(operatorName);
      }
    }
  })
  .catch(() => {})
  .finally(() => initWorker());

// Auto-select operator for non-admin users
function autoSelectOperator(name) {
  // Find which section/dept this operator belongs to
  let found = false;
  
  if (OPERATORS.sg.regular.includes(name)) {
    setSection('sg');
    setDept('regular');
    found = true;
  } else if (OPERATORS.sg.vip.includes(name)) {
    setSection('sg');
    setDept('vip');
    found = true;
  } else if (OPERATORS.nc.regular.includes(name)) {
    setSection('nc');
    setDept('regular');
    found = true;
  }
  
  if (found) {
    // Populate and select
    populateOperators();
    currentOp = name;
    sel.value = name;
    
    // Show badge
    const badge = document.getElementById('op-badge');
    badge.textContent = name;
    badge.style.display = 'flex';
    
    // Lock the selector (make it read-only)
    sel.disabled = true;
    sel.style.opacity = '0.6';
    sel.style.cursor = 'not-allowed';
    
    // Hide section/dept switchers for non-admins - they can only book for themselves
    const sectionBtns = document.querySelectorAll('#btn-sect-sg, #btn-sect-nc');
    sectionBtns.forEach(btn => {
      btn.style.display = 'none';
    });
    
    const deptSeg = document.getElementById('dept-seg');
    if (deptSeg) deptSeg.style.display = 'none';
    
    render();
  }
}
