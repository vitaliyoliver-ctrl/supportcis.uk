name = "supportcis-worker"
main = "src/index.ts"
compatibility_date = "2025-06-17"
compatibility_flags = ["nodejs_compat"]

# ── Статика SPA + API в одном воркере ────────────────────────────────────────
# Фронт собирается в ../app/dist и отдаётся как статика.
# Только /api/* идёт в код воркера (run_worker_first), остальное — статика
# с SPA-фоллбэком на index.html.
[assets]
directory = "../app/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# ── KV: сессии, коды, роли, профили, график, продажи, оргструктура ───────────
# Создайте СВОЙ namespace и подставьте его id:
#   npx wrangler kv namespace create AUTH_KV
# Значение ниже — плейсхолдер. В репозитории не должно быть id чужого аккаунта.
[[kv_namespaces]]
binding = "AUTH_KV"
id = "REPLACE_WITH_YOUR_AUTH_KV_ID"

# ── Открытые переменные (или Dashboard → Settings → Variables) ──────────────
[vars]
# Origin сайта (для CORS). При деплое одним воркером — это его собственный адрес.
SITE = "REPLACE_WITH_YOUR_SITE_ORIGIN"          # напр. https://supportcis-worker.<субдомен>.workers.dev
# Telegram-чат для заявок на обмен смен (опционально; пусто — уведомления не шлём).
TG_CHAT_ID = ""
# Кто получает роль TL при первом входе (bootstrap управления ролями).
OWNER_EMAIL = "REPLACE_WITH_OWNER_EMAIL"
# Разрешённые корпоративные домены входа (через запятую).
ALLOWED_DOMAINS = "velvix.org,gameup.club"

# ── Секреты (НЕ в toml; через `wrangler secret put NAME`) ───────────────────
# RESEND_API_KEY     — ключ Resend
# RESEND_FROM        — "SupportCIS <noreply@ВАШ_ВЕРИФИЦ_ДОМЕН>"
# TG_BOT_TOKEN       — токен Telegram-бота свапов (опционально)
# TG_WEBHOOK_SECRET  — секрет вебхука Telegram (опционально)
