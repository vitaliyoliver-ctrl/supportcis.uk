name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Не гоняем несколько деплоев параллельно
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (frontend + worker)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: [app, worker]
    defaults:
      run:
        working-directory: v2/${{ matrix.pkg }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v2/${{ matrix.pkg }}/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to server
    needs: build
    # Только при пуше в main (не на PR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude='.env' \
            --exclude='docker-compose.override.yml' \
            --exclude='kv-dump.json' \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            -e "ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts" \
            v2/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/supportcis/"

      - name: Build & restart on server
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd /opt/supportcis && docker compose up -d --build && echo '${{ github.sha }}' > .deployed_sha"

      - name: Health check
        run: |
          ssh -i ~/.ssh/deploy_key -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            'for i in $(seq 1 20); do curl -sf http://localhost:8787/api/health && exit 0; sleep 3; done; echo "health check failed"; docker compose -f /opt/supportcis/docker-compose.yml logs app --tail 30; exit 1'
