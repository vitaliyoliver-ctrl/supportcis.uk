name = "supportcis-worker"
main = "src/index.ts"
compatibility_date = "2025-06-17"
compatibility_flags = ["nodejs_compat"]

# ── Статика SPA + API в одном воркере ────────────────────────────────────────
# Фронт собирается в ../app/dist и отдаётся как статика.
# Только /api/* идёт в код воркера (run_worker_first), остальное — статика
# с SPA-фоллбэком на index.html.
[assets]
directory = "../app/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[kv_namespaces]]
binding = "AUTH_KV"
id = "e8660703a72b45e69d4e2750a6f88228"

# ── Открытые переменные (или Dashboard → Settings → Variables) ──────────────
[vars]
SITE = "https://supportcis-worker.workers.dev"  # для теста не критично (один origin)
TG_CHAT_ID = "-1004297208091"
OWNER_EMAIL = "vitaliy.oliver@velvix.org"        # получит роль TL при первом входе

# ── Секреты (НЕ в toml; через `wrangler secret put NAME`) ───────────────────
# RESEND_API_KEY     — ключ Resend
# RESEND_FROM        — "SupportCIS <noreply@ВАШ_ВЕРИФИЦ_ДОМЕН>"
# TG_BOT_TOKEN       — токен Telegram-бота свапов (опционально)
# TG_WEBHOOK_SECRET  — секрет вебхука Telegram (опционально)
